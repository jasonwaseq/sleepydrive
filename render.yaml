# Blueprint defaults for this repo. Your dashboard may use backend/realtime/ as Root Directory.
# If so, requirements.txt must exist under that path (backend/realtime/requirements.txt).

services:
  - type: web
    name: sleepydrive-gateway
    runtime: python
    rootDir: backend/realtime
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
